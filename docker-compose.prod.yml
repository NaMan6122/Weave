services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: weave
      POSTGRES_USER: weave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weave_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weave"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis_data:/data

  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.workers.scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
